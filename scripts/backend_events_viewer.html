<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Events Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 24px; }
        h1 { font-size: 20px; margin-bottom: 20px; color: #58a6ff; }

        .form-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-row label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 4px; }
        .form-row input { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 14px; font-family: inherit; }
        .form-row input:focus { outline: none; border-color: #58a6ff; }
        #base-url { width: 360px; }
        #token { width: 320px; }
        #file-id { width: 220px; }
        #url-suggestions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .url-badge { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .url-badge:hover { border-color: #58a6ff; color: #c9d1d9; }
        .url-badge .remove { color: #484f58; font-size: 13px; line-height: 1; }
        .url-badge .remove:hover { color: #f85149; }

        button { background: #238636; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; align-self: flex-end; }
        button:hover { background: #2ea043; }
        button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

        .error { background: #3d1a1a; border: 1px solid #f85149; color: #f85149; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .empty { color: #8b949e; font-style: italic; margin-top: 20px; }

        .timeline { position: relative; margin-top: 16px; padding-left: 28px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: #30363d; }

        .event { position: relative; margin-bottom: 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; }
        .event::before { content: ''; position: absolute; left: -24px; top: 18px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #30363d; background: #0d1117; }

        .event.MINERU_OUTPUT_STATUS::before { background: #1f6feb; border-color: #1f6feb; }
        .event.CONVERT_PDF_TO_IMAGE::before { background: #a371f7; border-color: #a371f7; }
        .event.PDF_SUMMARIZATION::before { background: #3fb950; border-color: #3fb950; }

        .event-header { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
        .event-type { font-weight: 600; font-size: 13px; }
        .event-type.MINERU_OUTPUT_STATUS { color: #58a6ff; }
        .event-type.CONVERT_PDF_TO_IMAGE { color: #d2a8ff; }
        .event-type.PDF_SUMMARIZATION { color: #56d364; }

        .event-time { font-size: 11px; color: #8b949e; margin-bottom: 8px; }
        .event-order { font-size: 11px; color: #8b949e; background: #21262d; padding: 2px 8px; border-radius: 10px; margin-right: 4px; }

        .event-props { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px 16px; margin-top: 8px; }
        .prop { font-size: 12px; }
        .prop-key { color: #8b949e; }
        .prop-val { color: #c9d1d9; }
        .prop-val.true { color: #3fb950; }
        .prop-val.false { color: #f85149; }
        .prop-val.null { color: #484f58; font-style: italic; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge.SUCCESS, .badge.2ND_PASS_COMPLETED { background: #0b2e13; color: #3fb950; }
        .badge.FAILED { background: #3d1a1a; color: #f85149; }
        .badge.1ST_PASS_COMPLETED { background: #0c2d6b; color: #58a6ff; }
        .badge.FALLBACK_COMPLETED { background: #2d1b00; color: #d29922; }

        .summary { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .summary-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 16px; min-width: 120px; }
        .summary-card .num { font-size: 22px; font-weight: 700; color: #58a6ff; }
        .summary-card .label { font-size: 11px; color: #8b949e; margin-top: 2px; }
    </style>
</head>
<body>
    <h1>Backend Events Viewer</h1>

    <div class="form-row">
        <div>
            <label>Base URL</label>
            <input id="base-url" type="text" placeholder="https://api.example.com/v3">
            <div id="url-suggestions"></div>
        </div>
        <div>
            <label>S2S Token</label>
            <input id="token" type="password" placeholder="Bearer token">
        </div>
        <div>
            <label>File ID</label>
            <input id="file-id" type="text" placeholder="e.g. abc123">
        </div>
        <button id="fetch-btn" onclick="fetchEvents()">Fetch</button>
    </div>

    <div id="output"></div>

    <script>
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Persist token and file-id
        ['token', 'file-id'].forEach(id => {
            const el = document.getElementById(id);
            const saved = localStorage.getItem(`bev_${id}`);
            if (saved) el.value = saved;
            el.addEventListener('input', () => localStorage.setItem(`bev_${id}`, el.value));
        });

        // URL history management
        function getUrlHistory() {
            try { return JSON.parse(localStorage.getItem('bev_url_history') || '[]'); }
            catch { return []; }
        }

        function saveUrlToHistory(url) {
            url = url.replace(/\/+$/, '');
            if (!url) return;
            let history = getUrlHistory().filter(u => u !== url);
            history.unshift(url);
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('bev_url_history', JSON.stringify(history));
            renderUrlSuggestions();
        }

        function removeUrlFromHistory(url) {
            const history = getUrlHistory().filter(u => u !== url);
            localStorage.setItem('bev_url_history', JSON.stringify(history));
            if (document.getElementById('base-url').value.replace(/\/+$/, '') === url) {
                document.getElementById('base-url').value = history[0] || '';
            }
            renderUrlSuggestions();
        }

        function renderUrlSuggestions() {
            const container = document.getElementById('url-suggestions');
            const current = document.getElementById('base-url').value.replace(/\/+$/, '');
            const history = getUrlHistory().filter(u => u !== current);
            container.innerHTML = '';
            history.forEach((url, i) => {
                const badge = document.createElement('span');
                badge.className = 'url-badge';
                badge.title = url;

                const text = document.createElement('span');
                text.className = 'url-text';
                text.textContent = url;
                text.addEventListener('click', () => selectUrl(url));

                const remove = document.createElement('span');
                remove.className = 'remove';
                remove.innerHTML = '&times;';
                remove.addEventListener('click', (e) => { e.stopPropagation(); removeUrlFromHistory(url); });

                badge.appendChild(text);
                badge.appendChild(remove);
                container.appendChild(badge);
            });
        }

        function selectUrl(url) {
            document.getElementById('base-url').value = url;
            saveUrlToHistory(url);
        }

        // Init: pre-fill latest URL
        const urlHistory = getUrlHistory();
        if (urlHistory.length) document.getElementById('base-url').value = urlHistory[0];
        renderUrlSuggestions();

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') fetchEvents();
        });

        async function fetchEvents() {
            const baseUrl = document.getElementById('base-url').value.replace(/\/+$/, '');
            const token = document.getElementById('token').value.trim();
            const fileId = document.getElementById('file-id').value.trim();
            const output = document.getElementById('output');
            const btn = document.getElementById('fetch-btn');

            if (!baseUrl || !token || !fileId) {
                output.innerHTML = '<div class="error">All fields are required.</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Loading...';
            output.innerHTML = '';

            const url = `${baseUrl}/get-title-summary/debug/backend-events/${encodeURIComponent(fileId)}`;

            try {
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`${res.status} ${res.statusText}: ${text}`);
                }

                const events = await res.json();
                saveUrlToHistory(baseUrl);
                render(events);
            } catch (err) {
                output.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Fetch';
            }
        }

        function render(events) {
            const output = document.getElementById('output');

            if (!events.length) {
                output.innerHTML = '<div class="empty">No events found for this file ID.</div>';
                return;
            }

            const counts = {};
            let withAnnotations = 0;
            let withoutAnnotations = 0;
            events.forEach(e => {
                counts[e.event_type] = (counts[e.event_type] || 0) + 1;
                if (e.has_annotations) withAnnotations++;
                else withoutAnnotations++;
            });

            let html = '<div class="summary">';
            html += summaryCard(events.length, 'Total Events');
            Object.entries(counts).forEach(([type, count]) => {
                html += summaryCard(count, type);
            });
            html += summaryCard(withAnnotations, 'With Annotations');
            html += summaryCard(withoutAnnotations, 'Without Annotations');
            html += '</div>';

            html += '<div class="timeline">';
            events.forEach((evt, i) => {
                const cssClass = evt.event_type || '';
                const time = evt.timestamp ? new Date(evt.timestamp).toLocaleString() : 'N/A';

                html += `<div class="event ${cssClass}">`;
                html += `<div class="event-header">`;
                html += `<span class="event-order">#${i + 1}</span>`;
                html += `<span class="event-type ${cssClass}">${escapeHtml(evt.event_type)}</span>`;
                html += `<span class="badge ${evt.status || ''}">${escapeHtml(evt.status || 'N/A')}</span>`;
                html += `</div>`;
                html += `<div class="event-time">${escapeHtml(time)}</div>`;

                html += `<div class="event-props">`;
                html += prop('flag_id', evt.flag_id);
                html += prop('response_type', evt.response_type);
                html += prop('has_annotations', evt.has_annotations);
                html += prop('annotations_count', evt.annotations_count);
                html += prop('supplementary_id', evt.supplementary_id);
                html += prop('message', evt.message);
                html += `</div></div>`;
            });
            html += '</div>';

            output.innerHTML = html;
        }

        function summaryCard(num, label) {
            return `<div class="summary-card"><div class="num">${num}</div><div class="label">${escapeHtml(label)}</div></div>`;
        }

        function prop(key, val) {
            let cls = '';
            let display = val;
            if (val === null || val === undefined) { display = 'null'; cls = 'null'; }
            else if (val === true) { display = 'true'; cls = 'true'; }
            else if (val === false) { display = 'false'; cls = 'false'; }
            return `<div class="prop"><span class="prop-key">${escapeHtml(key)}:</span> <span class="prop-val ${cls}">${escapeHtml(String(display))}</span></div>`;
        }

    </script>
</body>
</html>

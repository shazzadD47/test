version: "3"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
      - "5678:5678"
    volumes:
      - .:/code
      - ~/.cache/ai-app-pip-cache:/root/.cache/pip
    environment:
      ENV: "local"
      MONGODB_DATABASE_NAME: Delineate_Prod
      PORT: 8000
    command: "python -m debugpy --listen 0.0.0.0:5678 --wait-for-client -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery:
    container_name: dt-ai-celery
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A app.core worker --loglevel=info
    volumes:
      - .:/code
    depends_on:
      - app
      - redis

  redis:
    container_name: dt-ai-redis
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    environment:
      - REDIS_PASSWORD=123456

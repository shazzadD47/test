apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: delineate-ai-app-production-pdb
  namespace: production
  labels:
    app: delineate-ai-app-production
    environment: production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:

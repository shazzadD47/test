apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: delineate-ai-app-staging-pdb
  namespace: staging
  labels:
    app: delineate-ai-app-staging
    environment: staging
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: delineate-ai-app-staging
